<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="nav"></div>
        <div class="side-bar"></div>
        <div class="content">
            <h1>Financial Overview </h1>
            <p>Real-time tracking application</p>
            <div class="box">
                <div class="box1">
                    <div class="img-cover1">
                    <img src="./bank-fill.png" alt="">
                    </div>
                    <p>Current Balance</p>
                    <h2 class="amount">$0.00</h2>
                </div>
                <div class="box2">
                    <div class="img-cover2">
                    <img src="./increase.png" alt="">
                    </div>
                    <p>Total Income</p>
                    <h2 class="amount green">$0.00</h2>
                </div>
                <div class="box3">
                    <img src="./downtrend-arrow.png" alt="">
                    <p>Total Expense</p>
                    <h2 class="amount red">$0.00</h2>
                </div>
                <div class="box4">
                    <div class="img-cover4">
                    <img src="./pigi-bank-removebg-preview.png" alt="">
                    </div>  
                    <p> Total Transactions</p>
                    <h2 class="amount">0</h2>
                </div>
            </div>
            <div class="center">
                <div class="graph-area"></div>
                <div class="theme-area">
                    <h1>Preferences</h1>
                    <div class="theme">
                    <h4 >Dark Mode</h4>
                    <label for="check" class="label">
                        <div class="circle"></div>
                    </label>
                    <input type="checkbox" id="check">
                    </div>
                    <div class="hr"></div>
                    <button class="btn">
                        <img src="./delete-bin-7-fill.png" alt="">
                        <p>Reset All Data
                        </button>
                </div>
            </div>
            <div class="bottom"></div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
